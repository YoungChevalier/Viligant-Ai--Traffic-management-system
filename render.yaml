services:
  - type: web
    name: traffic-dashboard-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd services/dashboard-api && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: traffic-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: traffic-db
    databaseName: traffic_db
    user: traffic_user
