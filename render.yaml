services:
  - type: web
    name: traffic-dashboard-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd services/dashboard-api && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      # By not providing a Postgres DATABASE_URL, the app will automatically fallback
      # to using a local SQLite database (dashboard.sqlite), which is 100% free.
