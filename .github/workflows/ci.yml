name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        pip install -r requirements.txt
        
    - name: Lint with Ruff
      run: |
        ruff check .
        
    - name: Validate Container Builds (Smoke Test)
      run: |
        docker build --build-arg SERVICE_NAME=ingestion -t traffic-ingestion:test .
        docker build --build-arg SERVICE_NAME=detection -t traffic-detection:test .
